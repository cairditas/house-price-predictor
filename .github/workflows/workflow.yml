name: MLOps Workflow

on: 
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run the entire workflow'
        required: false
        default: 'true'

      run_data_processing:
        description: 'Run data processing step'
        required: false
        default: 'false'
      
      run_model_training:
        description: 'Run model training step'
        required: false
        default: 'false'

      run_build_and_publish:
        description: 'Run build and publish step'
        required: false
        default: 'false'
    
  # release:
  #   types: [ published ]
  #   branches: [ main ]
  #   tags: [ 'v*.*.*' ]

jobs:
  data_processing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11.15'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Process Data
      run: |
          python src/data/run_processing.py \
            --input data/raw/house_data.csv   \
            --output data/processed/cleaned_house_data.csv
      
    - name: Engineer Features
      run: |
        python src/features/engineer.py \
          --input data/processed/cleaned_house_data.csv \
          --output data/processed/featured_house_data.csv \
          --preprocessor models/trained/preprocessor.pkl
    
    - name: Upload Processed Data
      uses: actions/upload-artifact@v6
      with:
        name: processed-data
        path: data/processed/featured_house_data.csv
    
    - name: Upload Preprocessor
      uses: actions/upload-artifact@v6
      with:
        name: preprocessor
        path: models/trained/preprocessor.pkl
  
  model_training:
    needs: data_processing
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11.15'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Processed Data
      uses: actions/download-artifact@v6
      with:
        name: processed-data
        path: data/processed/

    - name: Setup MLFlow
      run: |
        docker pull ghcr.io/mlflow/mlflow:latest
        docker run -d -p 5555:5000 \
          --name mlflow-server \
          ghcr.io/mlflow/mlflow:latest \
          mlflow server \
          --host 0.0.0.0 \
          --backend-store-uri sqlite:///mlflow.db \
          --default-artifact-root /tmp/mlruns

    - name: Wait for MLFlow to be ready
      run: |
        echo "Waiting for MLFlow server to be ready..."
        until curl -s http://localhost:5555/ > /dev/null; do
          echo "MLFlow server is not ready yet. Retrying in 5 seconds..."
          sleep 5
        done
        echo "MLFlow server is ready!"

    - name: Train Model
      run: |
        mkdir -p models
        python src/models/train_model.py \
          --config configs/model_config.yaml \
          --data data/processed/featured_house_data.csv \
          --models-dir models \
          --mlflow-tracking-uri http://localhost:5555
    
    - name: Upload trained model
      uses: actions/upload-artifact@v6
      with:
        name: trained-model
        path: models/
    
    - name: Clean up MLFlow
      run: |
        docker stop mlflow-server || true
        docker rm mlflow-server || true
        docker rmi ghcr.io/mlflow/mlflow:latest
  
  build_and_publish:
    needs: model_training
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download preprocessor
        uses: actions/download-artifact@v6
        with:
          name: preprocessor
          path: models/trained/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and test Docker image
        run: |
          COMMIT_HASH=$(echo ${{ github.sha }} | cut -c1-7)
          docker build -t docker.io/${{ vars.DOCKERHUB_USERNAME }}/house-price-model:${COMMIT_HASH} -f Dockerfile .
          docker run -d -p 8000:8000 --name test-api docker.io/${{ vars.DOCKERHUB_USERNAME }}/house-price-model:${COMMIT_HASH}
          for i in {1..100}; do
            if curl -s http://localhost:8000/health > /dev/null; then
              echo "API is healthy!"
              break
            else
              echo "Waiting for API to be healthy... Attempt $i/10"
              sleep 5
            fi
          done
      
      - name: Clean Up Test Container
        run: |
          docker stop test-api || true
          docker rm test-api || true

      - name: Log into Docker
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          COMMIT_HASH=$(echo ${{ github.sha }} | cut -c1-7)
          docker tag docker.io/${{ vars.DOCKERHUB_USERNAME }}/house-price-model:${COMMIT_HASH} docker.io/${{ vars.DOCKERHUB_USERNAME }}/house-price-model:latest
          docker push docker.io/${{ vars.DOCKERHUB_USERNAME }}/house-price-model:${COMMIT_HASH}
          docker push docker.io/${{ vars.DOCKERHUB_USERNAME }}/house-price-model:latest
